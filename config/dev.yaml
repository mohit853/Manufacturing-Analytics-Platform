# config/dev.yaml
# Development environment configuration
# Use with: deploy.sh dev

environment: dev

aws:
  region: us-east-1
  profile: default

s3:
  raw_bucket:       manufacturing-analytics-raw-dev
  processed_bucket: manufacturing-analytics-processed-dev
  scripts_bucket:   manufacturing-analytics-glue-scripts-dev
  raw_prefixes:
    production: production/
    downtime:   downtime/
    quality:    quality/

glue:
  database:       manufacturing_analytics_db_dev
  job_name:       manufacturing-analytics-etl-job-dev
  worker_type:    G.1X
  num_workers:    2
  timeout_min:    30
  max_retries:    0
  crawler_schedule: "cron(0 6 * * ? *)"   # Daily 06:00 UTC in dev

redshift:
  cluster_id:   manufacturing-dev
  database:     manufacturing_dev
  schema:       manufacturing
  port:         5439
  iam_role_arn: arn:aws:iam::123456789012:role/RedshiftS3AccessRole-dev

logging:
  level: DEBUG
  format: json

data_quality:
  max_null_ratio:     0.10
  max_duplicate_ratio: 0.01
  oee_bounds:
    min: 0
    max: 100